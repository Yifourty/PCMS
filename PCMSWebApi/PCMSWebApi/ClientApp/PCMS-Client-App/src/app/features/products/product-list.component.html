    <div class="p-6 space-y-4">

      <!-- Filters -->
      <div class="grid md:grid-cols-3 gap-4">
        
        <!-- Search -->
        <input
          class="border p-2 rounded w-full"
          placeholder="Search products..."
          [formControl]="searchControl"
        />

        <!-- Category -->
        <select class="border p-2 rounded" [formControl]="categoryControl">
          <option value="">All Categories</option>
          <option *ngFor="let cat of categories()" [value]="cat.id">
            {{ cat.name }}
          </option>
        </select>

        <!-- Page Size -->
        <select class="border p-2 rounded" [formControl]="pageSizeControl">
          <option [value]="5">5</option>
          <option [value]="10">10</option>
          <option [value]="20">20</option>
        </select>

      </div>

      <!-- Products Grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        @for (product of products(); track product.id) {
          <div
            (click)="viewDetails(product.id)"
            class="group relative p-4 border border-slate-200 rounded-lg shadow-sm hover:shadow-md hover:border-blue-200 transition-all cursor-pointer bg-white"
          >
            <!-- Delete Button (Top Right) -->
            <button 
              (click)="deleteProduct(product.id)"
              class="absolute top-2 right-2 p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors opacity-0 group-hover:opacity-100"
              title="Delete Product"
            >
              <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>

            <h2 class="text-lg font-bold text-slate-800 pr-8">{{ product.name }}</h2>
            <p class="text-blue-600 font-semibold mt-1">{{ product.price | currency }}</p>
          </div>
        }
      </div>


      <!-- Pagination -->
      <div class="flex justify-between items-center">
        <button
          class="px-4 py-2 bg-gray-200 rounded"
          (click)="prevPage()"
          [disabled]="page() === 1"
        >
          Previous
        </button>

        <span>Page {{ page() }}</span>

        <button
          class="px-4 py-2 bg-gray-200 rounded"
          (click)="nextPage()"
        >
          Next
        </button>
      </div>

    </div>
