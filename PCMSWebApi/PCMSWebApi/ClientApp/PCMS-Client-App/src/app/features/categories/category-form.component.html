<h6 class="text-sm font-medium text-slate-700">Create New Category</h6>
<form [formGroup]="form" (ngSubmit)="submit()"
  class="max-w-md mx-auto p-8 bg-white border border-slate-200 rounded-xl shadow-sm space-y-5">
  
  <h2 class="text-xl font-semibold text-slate-800 mb-2">Category Details</h2>

  <!-- Name Field -->
  <div class="space-y-1">
    <label class="text-sm font-medium text-slate-700">Product Name</label>
    <input formControlName="name" placeholder="Enter name" 
      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
      [class.border-red-500]="form.get('name')?.invalid && form.get('name')?.touched" />
    @if(form.controls['name'].invalid && form.controls['name'].touched) {
      <div class="text-xs text-red-500 mt-1">Name is required</div>
    }
  </div>

  <!-- description Field -->
  <div class="space-y-1">
    <label class="text-sm font-medium text-slate-700">Description</label>
    <input formControlName="description" placeholder="Enter description" 
      class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" />
  </div>


  <!-- Category Field -->
<div class="space-y-1">
  <label class="text-sm font-medium text-slate-700">Parent Category</label>
  <select class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" 
          formControlName="parentCategoryId">
    <option value="">Select a parent category</option>
    
    @for (cat of categories(); track cat.id) {
      <option [value]="cat.id">{{ cat.name }}</option>
    }
  </select>
</div>

  <!-- Submit Button -->
  <button type="submit" [disabled]="form.invalid"
    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-md transition-colors duration-200 mt-4">
    Save Product
  </button>
</form>
